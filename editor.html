<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScreenCapture Pro — Editor</title>
  <link rel="stylesheet" href="editor.css">
  <!-- Tesseract.js bundled locally — no CDN, works offline after first lang-data fetch -->
  <script src="tesseract.min.js"></script>
</head>
<body>
  <!-- Toolbar -->
  <div id="toolbar">
    <div class="toolbar-section brand">
      <svg width="20" height="20" viewBox="0 0 28 28" fill="none">
        <rect width="28" height="28" rx="6" fill="#e94560"/>
        <rect x="5" y="7" width="18" height="14" rx="2" stroke="white" stroke-width="1.5" fill="none"/>
        <circle cx="14" cy="14" r="4" fill="white" opacity="0.9"/>
        <circle cx="14" cy="14" r="2" fill="#e94560"/>
      </svg>
    </div>

    <div class="toolbar-section tools">
      <button class="tool-btn active" data-tool="select"   title="Select/Pan (V)">
        <svg viewBox="0 0 20 20"><path d="M4 2l12 8-6 1-3 6z" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linejoin="round"/></svg>
      </button>
      <button class="tool-btn" data-tool="pen"     title="Freehand Pen (P)">
        <svg viewBox="0 0 20 20"><path d="M4 16l2-5L14 3l3 3-8 8z" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linejoin="round"/><path d="M4 16l2-2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
      <button class="tool-btn" data-tool="highlight" title="Highlight (H)">
        <svg viewBox="0 0 20 20"><rect x="3" y="9" width="14" height="7" rx="1" fill="currentColor" opacity="0.45"/><path d="M3 9h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
      <button class="tool-btn" data-tool="arrow"   title="Arrow (A)">
        <svg viewBox="0 0 20 20"><line x1="4" y1="16" x2="16" y2="4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><polyline points="10,4 16,4 16,10" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linejoin="round" stroke-linecap="round"/></svg>
      </button>
      <button class="tool-btn" data-tool="line"    title="Line (L)">
        <svg viewBox="0 0 20 20"><line x1="4" y1="16" x2="16" y2="4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
      <button class="tool-btn" data-tool="rect"    title="Rectangle (R)">
        <svg viewBox="0 0 20 20"><rect x="4" y="5" width="12" height="10" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
      </button>
      <button class="tool-btn" data-tool="ellipse" title="Ellipse (E)">
        <svg viewBox="0 0 20 20"><ellipse cx="10" cy="10" rx="7" ry="5" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
      </button>
      <button class="tool-btn" data-tool="callout" title="Callout Bubble (Q)">
        <svg viewBox="0 0 20 20"><path d="M3 4h14v9H8l-3 3v-3H3z" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linejoin="round"/></svg>
      </button>
      <button class="tool-btn" data-tool="step"    title="Numbered Step (N)">
        <svg viewBox="0 0 20 20"><circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.5" fill="none"/><text x="10" y="14.5" text-anchor="middle" font-size="9" font-weight="bold" fill="currentColor" font-family="sans-serif">1</text></svg>
      </button>
      <button class="tool-btn" data-tool="text"    title="Text (T)">
        <svg viewBox="0 0 20 20"><text x="4" y="15" font-size="14" font-weight="bold" fill="currentColor" font-family="serif">T</text></svg>
      </button>
      <button class="tool-btn" data-tool="blur"    title="Blur/Redact (B)">
        <svg viewBox="0 0 20 20"><rect x="4" y="7" width="12" height="7" rx="1" stroke="currentColor" stroke-width="1.5" fill="none" stroke-dasharray="3,2"/><line x1="6" y1="10" x2="14" y2="10" stroke="currentColor" stroke-width="1.5" stroke-dasharray="2,2" stroke-linecap="round"/></svg>
      </button>
      <button class="tool-btn" data-tool="sticky"  title="Sticky Note (K)">
        <svg viewBox="0 0 20 20"><rect x="3" y="3" width="12" height="14" rx="1" fill="currentColor" opacity="0.25"/><rect x="3" y="3" width="12" height="14" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M6 8h8M6 11h5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/></svg>
      </button>
      <!-- Feature 9: Cursor/Pointer Annotation Tool -->
      <button class="tool-btn" data-tool="cursor"  title="Cursor Pointer (M)">
        <svg viewBox="0 0 20 20">
          <path d="M4 2 L4 14 L7.5 11 L9.5 16 L11 15.4 L9 10.4 L13 10.4 Z" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
        </svg>
      </button>
      <!-- Feature 6: OCR Tool -->
      <button class="tool-btn" data-tool="ocr"     title="Extract Text - OCR (X)">
        <svg viewBox="0 0 20 20">
          <rect x="3" y="3" width="10" height="13" rx="1" stroke="currentColor" stroke-width="1.4" fill="none"/>
          <path d="M5 7h6M5 10h6M5 13h4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
          <circle cx="15" cy="15" r="3.5" stroke="currentColor" stroke-width="1.3" fill="none"/>
          <line x1="17.5" y1="17.5" x2="19" y2="19" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
      <button class="tool-btn" data-tool="crop"    title="Crop (C)">
        <svg viewBox="0 0 20 20"><path d="M6 2v12h12M2 6h12v12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>

    <div class="toolbar-section options" id="toolOptions">
      <label class="option-label" title="Color">
        <span>Color</span>
        <input type="color" id="colorPicker" value="#e94560">
      </label>
      <label class="option-label" title="Stroke size">
        <span>Size</span>
        <input type="range" id="sizeSlider" min="1" max="30" value="3">
        <span id="sizeVal">3</span>
      </label>
      <label class="option-label" id="fillOption" style="display:none">
        <span>Fill</span>
        <input type="checkbox" id="fillCheck">
      </label>
      <label class="option-label" id="blurOption" style="display:none">
        <span>Blur</span>
        <input type="range" id="blurSlider" min="2" max="20" value="8">
        <span id="blurVal">8</span>
      </label>
      <label class="option-label" id="fontSizeOption" style="display:none">
        <span>Font</span>
        <input type="range" id="fontSizeSlider" min="10" max="72" value="24">
        <span id="fontSizeVal">24</span>
      </label>
      <!-- Highlight colour -->
      <label class="option-label" id="highlightColorOption" style="display:none">
        <span>Color</span>
        <input type="color" id="highlightColor" value="#FFE500">
      </label>
      <!-- Step counter -->
      <span class="option-label" id="stepOption" style="display:none">
        <span>Step&nbsp;<strong id="stepCountDisplay">1</strong></span>
        <button class="small-btn" id="stepReset">Reset</button>
      </span>
    </div>

    <div class="toolbar-section actions">
      <button class="action-btn" id="undoBtn" title="Undo (Ctrl+Z)" disabled>
        <svg viewBox="0 0 20 20"><path d="M4 8 A6 6 0 1 1 10 16" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/><polyline points="4,4 4,8 8,8" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linejoin="round" stroke-linecap="round"/></svg>
        Undo
      </button>
      <button class="action-btn" id="redoBtn" title="Redo (Ctrl+Y)" disabled>
        <svg viewBox="0 0 20 20"><path d="M16 8 A6 6 0 1 0 10 16" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/><polyline points="16,4 16,8 12,8" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linejoin="round" stroke-linecap="round"/></svg>
        Redo
      </button>
      <button class="action-btn" id="historyBtn" title="History panel">
        <svg viewBox="0 0 20 20"><circle cx="10" cy="10" r="6" stroke="currentColor" stroke-width="1.5" fill="none"/><polyline points="10,6 10,10 13,12" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        History
      </button>
    </div>

    <div class="toolbar-section zoom-controls">
      <button class="icon-btn" id="zoomOut" title="Zoom out (-)">
        <svg viewBox="0 0 20 20"><circle cx="9" cy="9" r="5" stroke="currentColor" stroke-width="1.5" fill="none"/><line x1="6" y1="9" x2="12" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="14" y1="14" x2="17" y2="17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
      <span id="zoomLabel">100%</span>
      <button class="icon-btn" id="zoomIn" title="Zoom in (+)">
        <svg viewBox="0 0 20 20"><circle cx="9" cy="9" r="5" stroke="currentColor" stroke-width="1.5" fill="none"/><line x1="9" y1="6" x2="9" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="6" y1="9" x2="12" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="14" y1="14" x2="17" y2="17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
      <button class="icon-btn" id="zoomFit" title="Fit to window (0)">
        <svg viewBox="0 0 20 20"><polyline points="3,7 3,3 7,3" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/><polyline points="17,7 17,3 13,3" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/><polyline points="3,13 3,17 7,17" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/><polyline points="17,13 17,17 13,17" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <div class="toolbar-section export-actions">
      <button class="export-btn download" id="downloadBtn" title="Download PNG (Ctrl+S)">
        <svg viewBox="0 0 20 20"><path d="M10 3v10M6 9l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M3 15h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        PNG
      </button>
      <!-- Feature 7: JPEG Export -->
      <button class="export-btn jpeg" id="jpegBtn" title="Download JPEG">
        <svg viewBox="0 0 20 20"><path d="M10 3v10M6 9l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M3 15h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        JPEG
      </button>
      <!-- Feature 2: PDF Export -->
      <button class="export-btn pdf" id="pdfBtn" title="Download PDF">
        <svg viewBox="0 0 20 20">
          <rect x="4" y="2" width="12" height="16" rx="1.5" stroke="currentColor" stroke-width="1.4" fill="none"/>
          <path d="M7 7h6M7 10h6M7 13h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" opacity="0.8"/>
        </svg>
        PDF
      </button>
      <button class="export-btn copy" id="copyBtn" title="Copy to Clipboard">
        <svg viewBox="0 0 20 20"><rect x="7" y="7" width="10" height="12" rx="1.5" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M13 7V5a1.5 1.5 0 0 0-1.5-1.5H5A1.5 1.5 0 0 0 3.5 5v9A1.5 1.5 0 0 0 5 15.5h2" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
        Copy
      </button>
      <!-- Feature 7: JPEG Quality Slider (shown on hover) -->
      <span class="option-label jpeg-qual-opt" id="jpegQualOpt" style="display:none">
        Q<input type="range" id="jpegQual" min="10" max="100" value="92" style="width:56px">
        <span id="jpegQualVal">92</span>%
      </span>
    </div>
  </div>

  <!-- Canvas Area -->
  <div id="canvasWrapper">
    <div id="loadingOverlay">
      <div class="spinner"></div>
      <p id="loadingText">Stitching screenshot…</p>
    </div>

    <div id="viewport">
      <div id="canvasContainer">
        <canvas id="baseCanvas"></canvas>
        <canvas id="drawCanvas"></canvas>

        <!-- Sticky notes layer (inside canvasContainer so it scales with zoom) -->
        <div id="stickyLayer"></div>

        <!-- Crop overlay -->
        <div id="cropOverlay" style="display:none">
          <div id="cropBox">
            <div class="crop-handle tl"></div>
            <div class="crop-handle tr"></div>
            <div class="crop-handle bl"></div>
            <div class="crop-handle br"></div>
          </div>
        </div>

        <!-- Shared text input (text tool + callout) -->
        <textarea id="textInput" style="display:none" placeholder="Type here…"></textarea>
      </div>
    </div>
  </div>

  <!-- History panel -->
  <div id="historyPanel" class="hidden">
    <div class="history-header">
      <span>History</span>
      <button id="closeHistory">×</button>
    </div>
    <div id="historyList"></div>
  </div>

  <!-- Feature 6: OCR Panel -->
  <div id="ocrPanel" class="hidden">
    <div class="ocr-header">
      <span>Extracted Text</span>
      <button id="closeOcr">×</button>
    </div>
    <div id="ocrProgress" style="display:none">
      <div class="ocr-spinner"></div>
      Running OCR…
    </div>
    <div id="ocrResult"></div>
    <div class="ocr-actions" id="ocrActions" style="display:none">
      <button id="ocrCopy">Copy Text</button>
      <button id="ocrInsert">Insert as Annotation</button>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <!-- Crop confirm bar -->
  <div id="cropBar" style="display:none">
    <button id="cropApply">Apply Crop</button>
    <button id="cropCancel">Cancel</button>
  </div>

  <script src="editor.js"></script>
</body>
</html>
