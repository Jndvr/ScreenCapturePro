<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScreenCapture Pro</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #111113;
      --surface:      #1c1c1f;
      --surface-hover:#28282c;
      --border:       #36363a;
      --border-subtle:#2c2c30;
      --text:         #f0f0f4;
      --text-muted:   #a0a0ac;
      --text-dim:     #686878;
      --accent:       #e8485e;
      --accent-hover: #f05570;
      --accent-dim:   rgba(232,72,94,0.14);
      --accent-border:rgba(232,72,94,0.4);
    }

    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      background: var(--bg);
      color: var(--text);
    }

    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-radius: 4px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 14px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .logo { flex-shrink: 0; }
    .header-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    .header-sub { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

    /* ── Content ── */
    .content { padding: 10px 12px 12px; }

    /* ── Capture buttons ── */
    .btn {
      width: 100%;
      padding: 8px 11px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: transparent;
      color: var(--text);
      font-size: 12px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 9px;
      transition: background 0.1s, border-color 0.1s;
      margin-bottom: 5px;
    }
    .btn:hover:not(:disabled) { background: var(--surface-hover); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border-radius: 6px;
      flex-shrink: 0;
    }
    .btn-text { flex: 1; text-align: left; }
    .btn-key {
      font-size: 10px;
      color: var(--text-dim);
      font-family: 'SF Mono', 'Consolas', 'Menlo', monospace;
      flex-shrink: 0;
    }

    /* Primary — full page */
    .btn-primary {
      border-color: var(--accent-border);
      background: var(--accent-dim);
    }
    .btn-primary:hover:not(:disabled) { background: rgba(232,72,94,0.2); }
    .btn-primary .btn-icon { background: var(--accent); color: #fff; }
    .btn-primary .btn-text { font-weight: 600; }

    /* Visible area */
    .btn-secondary .btn-icon { background: var(--surface-hover); color: var(--text-muted); }

    /* Region */
    .btn-region { border-color: #2c3d52; }
    .btn-region .btn-icon { background: #1a2a3a; color: #6ba4d4; }
    .btn-region .btn-text { color: #9bbdd8; }

    /* Record */
    .btn-record { border-color: #3a2020; }
    .btn-record .btn-icon { background: #2a1515; color: #f07070; }
    .btn-record .btn-text { color: #d49090; }

    /* ── Separator ── */
    .sep { border: none; border-top: 1px solid var(--border); margin: 9px 0; }

    /* ── Settings section ── */
    .section-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-dim);
      margin-bottom: 9px;
    }

    .setting-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .setting-row:last-child { margin-bottom: 0; }
    .row-label {
      font-size: 11px;
      color: var(--text-muted);
      width: 40px;
      flex-shrink: 0;
    }

    /* Delay pills */
    .pill-group {
      display: flex;
      gap: 3px;
      flex: 1;
    }
    .pill {
      flex: 1;
      padding: 4px 0;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: transparent;
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      text-align: center;
      transition: background 0.1s, border-color 0.1s, color 0.1s;
    }
    .pill:hover:not(.active) { background: var(--surface-hover); }
    .pill.active {
      background: var(--accent-dim);
      border-color: var(--accent-border);
      color: var(--accent);
    }

    /* Range */
    .range-wrap { display: flex; align-items: center; gap: 7px; flex: 1; }
    input[type="range"] { flex: 1; accent-color: var(--accent); cursor: pointer; }
    .range-val { font-size: 11px; color: var(--text-muted); min-width: 38px; text-align: right; }

    /* Toggle rows */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 7px;
    }
    .toggle-row:last-child { margin-bottom: 0; }
    .toggle-text { font-size: 11px; color: var(--text-muted); }

    .toggle {
      position: relative;
      width: 32px;
      height: 18px;
      flex-shrink: 0;
    }
    .toggle input {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--surface-hover);
      border: 1px solid var(--border);
      border-radius: 9px;
      cursor: pointer;
      transition: background 0.18s, border-color 0.18s;
    }
    .toggle input:checked + .toggle-track { background: var(--accent); border-color: var(--accent); }
    .toggle-track::after {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      top: 2px;
      left: 2px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.18s;
    }
    .toggle input:checked + .toggle-track::after { transform: translateX(14px); }
    .toggle input:focus-visible + .toggle-track {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* ── Status ── */
    #statusMsg {
      margin-top: 8px;
      padding: 7px 10px;
      border-radius: 6px;
      font-size: 11px;
      line-height: 1.5;
      display: none;
      border: 1px solid transparent;
    }
    #statusMsg.info    { background: #141e2c; color: #78b4e0; border-color: #1e3448; display: block; }
    #statusMsg.error   { background: #1e0f14; color: #f07080; border-color: #3a1820; display: block; }
    #statusMsg.success { background: #0d1e16; color: #6dd6a0; border-color: #1a3a28; display: block; }

    #countdownDisplay {
      font-size: 30px;
      font-weight: 800;
      color: var(--accent);
      text-align: center;
      padding: 6px 0 0;
      display: none;
    }

    .progress-bar {
      height: 2px;
      background: var(--border);
      border-radius: 1px;
      margin-top: 8px;
      overflow: hidden;
      display: none;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 1px;
      transition: width 0.3s ease;
    }

    /* ── Footer ── */
    .footer {
      padding: 0 12px 10px;
    }
    .footer-tip {
      font-size: 10px;
      color: var(--text-dim);
      line-height: 1.6;
      text-align: center;
      margin-bottom: 8px;
    }
    .footer-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 8px;
      border-top: 1px solid var(--border-subtle);
    }
    .footer-version {
      font-size: 10px;
      color: var(--text-dim);
      font-family: 'SF Mono', 'Consolas', 'Menlo', monospace;
    }
    .footer-links {
      display: flex;
      gap: 6px;
    }
    .footer-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
    }
    .footer-btn:hover {
      background: var(--surface-hover);
      color: var(--text);
      border-color: var(--border);
    }
  </style>
</head>
<body>

  <div class="header">
    <svg class="logo" width="28" height="28" viewBox="0 0 28 28" fill="none" aria-hidden="true">
      <rect width="28" height="28" rx="6" fill="#e8485e"/>
      <rect x="5" y="7" width="18" height="14" rx="2" stroke="white" stroke-width="1.5" fill="none"/>
      <circle cx="14" cy="14" r="4" fill="white" opacity="0.9"/>
      <circle cx="14" cy="14" r="2" fill="#e8485e"/>
    </svg>
    <div>
      <div class="header-title">ScreenCapture Pro</div>
      <div class="header-sub">Capture, annotate &amp; export</div>
    </div>
  </div>

  <div class="content">

    <!-- Capture actions -->
    <button class="btn btn-primary" id="captureBtn" aria-label="Capture full page (Alt+Shift+S)">
      <span class="btn-icon" aria-hidden="true">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
          <rect x="1" y="4" width="14" height="10" rx="1.5" stroke="currentColor" stroke-width="1.5" fill="none"/>
          <circle cx="8" cy="9" r="2.5" fill="currentColor"/>
          <path d="M6 4V3a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v1" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linecap="round"/>
        </svg>
      </span>
      <span class="btn-text">Capture Full Page</span>
      <span class="btn-key" aria-hidden="true">⌥⇧S</span>
    </button>

    <button class="btn btn-secondary" id="captureViewport" aria-label="Capture visible area (Alt+Shift+V)">
      <span class="btn-icon" aria-hidden="true">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
          <rect x="2" y="2" width="12" height="12" rx="1.5" stroke="currentColor" stroke-width="1.5" fill="none"/>
          <path d="M5 8 L7 10 L11 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      <span class="btn-text">Capture Visible Area</span>
      <span class="btn-key" aria-hidden="true">⌥⇧V</span>
    </button>

    <button class="btn btn-region" id="captureRegionBtn" aria-label="Select region to capture (Alt+Shift+R)">
      <span class="btn-icon" aria-hidden="true">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
          <path d="M2 5V2h3M11 2h3v3M14 11v3h-3M5 14H2v-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      <span class="btn-text">Capture Region</span>
      <span class="btn-key" aria-hidden="true">⌥⇧R</span>
    </button>

    <button class="btn btn-record" id="recordBtn" aria-label="Record screen">
      <span class="btn-icon" aria-hidden="true">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.4" fill="none"/>
          <circle cx="8" cy="8" r="2.5" fill="currentColor"/>
        </svg>
      </span>
      <span class="btn-text">Record Screen</span>
    </button>

    <hr class="sep" role="separator">

    <!-- Settings -->
    <div class="section-label">Settings</div>

    <div class="setting-row">
      <span class="row-label" id="lbl-delay">Delay</span>
      <div class="pill-group" role="group" aria-labelledby="lbl-delay">
        <button class="pill active" data-delay="0" aria-pressed="true">None</button>
        <button class="pill" data-delay="3" aria-pressed="false">3 s</button>
        <button class="pill" data-delay="5" aria-pressed="false">5 s</button>
      </div>
    </div>

    <div class="setting-row">
      <label class="row-label" for="speedSlider">Speed</label>
      <div class="range-wrap">
        <input type="range" id="speedSlider" min="1" max="3" value="2" aria-valuetext="Normal">
        <span class="range-val" id="speedLabel" aria-live="polite">Normal</span>
      </div>
    </div>

    <div class="toggle-row">
      <span class="toggle-text" id="lbl-lazy">Wait for lazy images</span>
      <label class="toggle" title="Wait for lazy images to load before capturing">
        <input type="checkbox" id="lazyLoad" checked aria-labelledby="lbl-lazy">
        <div class="toggle-track"></div>
      </label>
    </div>

    <div class="toggle-row">
      <span class="toggle-text" id="lbl-stamp">Add URL &amp; timestamp</span>
      <label class="toggle" title="Stamp the URL and capture time onto the image">
        <input type="checkbox" id="urlStamp" aria-labelledby="lbl-stamp">
        <div class="toggle-track"></div>
      </label>
    </div>

    <!-- Status / progress -->
    <div id="countdownDisplay" aria-live="assertive"></div>
    <div id="statusMsg" role="status" aria-live="polite"></div>
    <div class="progress-bar" id="progressBar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>

  </div>

  <div class="footer">
    <p class="footer-tip">Opens editor after capture · Annotate, blur, crop &amp; export to PNG · JPEG · PDF</p>
    <div class="footer-bar">
      <span class="footer-version">v1.1</span>
      <div class="footer-links">
        <button class="footer-btn" id="supportBtn">☕ Support</button>
        <button class="footer-btn" id="feedbackBtn">💬 Feedback</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
