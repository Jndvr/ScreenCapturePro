<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScreenCapture Pro</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 260px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
    }
    .header {
      background: linear-gradient(135deg, #16213e, #0f3460);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #0f3460;
    }
    .header svg { flex-shrink: 0; }
    .header-text h1 { font-size: 14px; font-weight: 700; color: #e94560; }
    .header-text p { font-size: 10px; color: #a0a0b0; margin-top: 1px; }
    .content { padding: 12px 14px; }
    .btn {
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.15s ease;
      margin-bottom: 7px;
    }
    .btn-primary { background: linear-gradient(135deg, #e94560, #c73652); color: white; }
    .btn-primary:hover { background: linear-gradient(135deg, #ff5577, #e94560); transform: translateY(-1px); }
    .btn-secondary { background: #0f3460; color: #b0c4de; border: 1px solid #1a4a80; }
    .btn-secondary:hover { background: #1a4a80; }
    .btn-region { background: #1a3a60; color: #7ec8e3; border: 1px solid #2a5a90; }
    .btn-region:hover { background: #2a4a70; }
    .btn-record { background: #3d1010; color: #ff8888; border: 1px solid #6d2020; }
    .btn-record:hover { background: #5a1818; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Settings section */
    .settings {
      background: #12122a;
      border: 1px solid #1a2a50;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 10px;
    }
    .setting-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .setting-row:last-child { margin-bottom: 0; }
    .setting-label {
      font-size: 11px;
      color: #8080a0;
      width: 44px;
      flex-shrink: 0;
    }
    /* Delay buttons */
    .delay-group {
      display: flex;
      gap: 4px;
      flex: 1;
    }
    .delay-btn {
      flex: 1;
      padding: 4px 0;
      border: 1px solid #1a3060;
      border-radius: 5px;
      background: #0f2045;
      color: #7090c0;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.12s;
    }
    .delay-btn.active {
      background: #1a4a80;
      border-color: #3060b0;
      color: #b0d0ff;
    }
    .delay-btn:hover:not(.active) { background: #152840; }
    /* Speed slider */
    .speed-slider {
      flex: 1;
      accent-color: #e94560;
      cursor: pointer;
    }
    .speed-label {
      font-size: 10px;
      color: #6080a0;
      width: 42px;
      text-align: right;
      flex-shrink: 0;
    }
    /* Lazy load toggle */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .toggle-label { font-size: 11px; color: #8080a0; }
    .toggle {
      position: relative;
      width: 32px;
      height: 17px;
      flex-shrink: 0;
    }
    .toggle input { display: none; }
    .toggle-track {
      position: absolute;
      inset: 0;
      background: #1a3060;
      border-radius: 9px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle input:checked + .toggle-track { background: #e94560; }
    .toggle-track::after {
      content: '';
      position: absolute;
      width: 13px;
      height: 13px;
      left: 2px;
      top: 2px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle input:checked + .toggle-track::after { transform: translateX(15px); }

    .status {
      margin-top: 8px;
      padding: 7px 10px;
      border-radius: 6px;
      font-size: 11px;
      display: none;
      line-height: 1.4;
    }
    .status.info { background: #0f3460; color: #7ec8e3; display: block; }
    .status.error { background: #3d0f1a; color: #ff7088; display: block; }
    .status.success { background: #0f3d1a; color: #7ee3a0; display: block; }
    .countdown {
      font-size: 28px;
      font-weight: 800;
      color: #e94560;
      text-align: center;
      padding: 6px 0 2px;
      display: none;
    }
    .progress-bar {
      width: 100%;
      height: 3px;
      background: #0f3460;
      border-radius: 2px;
      margin-top: 6px;
      overflow: hidden;
      display: none;
    }
    .progress-fill {
      height: 100%;
      background: #e94560;
      transition: width 0.3s ease;
      border-radius: 2px;
    }
    .divider { border: none; border-top: 1px solid #0f3460; margin: 10px 0; }
    .tip { font-size: 10px; color: #505070; text-align: center; line-height: 1.4; }
    .shortcut-tip { font-size: 10px; color: #404060; text-align: center; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="header">
    <svg width="26" height="26" viewBox="0 0 28 28" fill="none">
      <rect width="28" height="28" rx="6" fill="#e94560"/>
      <rect x="5" y="7" width="18" height="14" rx="2" stroke="white" stroke-width="1.5" fill="none"/>
      <circle cx="14" cy="14" r="4" fill="white" opacity="0.9"/>
      <circle cx="14" cy="14" r="2" fill="#e94560"/>
      <rect x="11" y="5" width="6" height="3" rx="1" fill="white"/>
    </svg>
    <div class="header-text">
      <h1>ScreenCapture Pro</h1>
      <p>Full-page capture &amp; editor</p>
    </div>
  </div>

  <div class="content">
    <button class="btn btn-primary" id="captureBtn">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
        <rect x="1" y="3" width="14" height="10" rx="1.5" stroke="white" stroke-width="1.4" fill="none"/>
        <circle cx="8" cy="8" r="2.5" fill="white"/>
        <path d="M6 3 L7 1 L9 1 L10 3" stroke="white" stroke-width="1.2" fill="none" stroke-linejoin="round"/>
      </svg>
      Capture Full Page
    </button>
    <button class="btn btn-secondary" id="captureViewport">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
        <rect x="2" y="2" width="12" height="12" rx="1.5" stroke="#b0c4de" stroke-width="1.4" fill="none"/>
        <path d="M5 8 L7 10 L11 6" stroke="#7ec8e3" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Capture Visible Area
    </button>
    <button class="btn btn-region" id="captureRegionBtn">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
        <path d="M2 5V2h3M11 2h3v3M14 11v3h-3M5 14H2v-3" stroke="#7ec8e3" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="4" y="4" width="8" height="8" rx="1" stroke="#7ec8e3" stroke-width="1" fill="rgba(126,200,227,0.15)" stroke-dasharray="2,2"/>
      </svg>
      Capture Region
    </button>
    <button class="btn btn-record" id="recordBtn">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="8" r="6" stroke="#ff8888" stroke-width="1.4" fill="none"/>
        <circle cx="8" cy="8" r="3" fill="#ff4444"/>
      </svg>
      Record Screen
    </button>

    <!-- Settings -->
    <div class="settings">
      <!-- Delay -->
      <div class="setting-row">
        <span class="setting-label">Delay</span>
        <div class="delay-group">
          <button class="delay-btn active" data-delay="0">None</button>
          <button class="delay-btn" data-delay="3">3 s</button>
          <button class="delay-btn" data-delay="5">5 s</button>
        </div>
      </div>
      <!-- Scroll speed -->
      <div class="setting-row">
        <span class="setting-label">Speed</span>
        <input type="range" class="speed-slider" id="speedSlider" min="1" max="3" value="2">
        <span class="speed-label" id="speedLabel">Normal</span>
      </div>
      <!-- Lazy load -->
      <div class="toggle-row" style="margin-bottom:6px">
        <span class="toggle-label">Wait for lazy images</span>
        <label class="toggle">
          <input type="checkbox" id="lazyLoad" checked>
          <div class="toggle-track"></div>
        </label>
      </div>
      <!-- URL + Timestamp stamp -->
      <div class="toggle-row">
        <span class="toggle-label">URL + time stamp</span>
        <label class="toggle">
          <input type="checkbox" id="urlStamp">
          <div class="toggle-track"></div>
        </label>
      </div>
    </div>

    <div id="countdownDisplay" class="countdown"></div>
    <div id="statusMsg" class="status"></div>
    <div class="progress-bar" id="progressBar">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>

    <hr class="divider">
    <p class="tip">Opens an editor tab after capture.<br>Annotate, blur, crop &amp; export.</p>
    <p class="shortcut-tip">Alt+Shift+S: Full page &nbsp;|&nbsp; Alt+Shift+V: Visible<br>Alt+Shift+R: Region</p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
