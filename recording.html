<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScreenCapture Pro — Screen Recorder</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #12121e;
      --card-bg: #1a1a2e;
      --border: #0f3460;
      --accent: #e94560;
      --accent-hover: #ff5577;
      --text: #d0d0e0;
      --text-dim: #707090;
      --btn-bg: #252545;
      --btn-hover: #303060;
      --green: #2ecc71;
      --green-hover: #27ae60;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .header-icon {
      width: 44px; height: 44px;
      background: rgba(233,69,96,0.15);
      border: 1px solid rgba(233,69,96,0.3);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
    }
    .header-title { font-size: 18px; font-weight: 700; color: var(--text); }
    .header-sub   { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

    /* Timer */
    .timer-display {
      text-align: center;
      font-size: 56px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      color: var(--accent);
      letter-spacing: 2px;
      margin: 8px 0 24px;
      font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
      line-height: 1;
    }
    .timer-display.idle    { color: var(--text-dim); }
    .timer-display.paused  { color: #f39c12; }
    .timer-display.running { color: var(--accent); }

    /* Status indicator */
    .status-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 24px;
      font-size: 13px;
      color: var(--text-dim);
    }
    .status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--text-dim);
      flex-shrink: 0;
    }
    .status-dot.recording { background: var(--accent); animation: blink 1s step-start infinite; }
    .status-dot.paused    { background: #f39c12; }
    .status-dot.ready     { background: var(--green); }
    @keyframes blink { 50% { opacity: 0.2; } }

    /* Format selector */
    .format-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .format-label { font-size: 12px; color: var(--text-dim); width: 52px; flex-shrink: 0; }
    .format-group { display: flex; gap: 6px; }
    .format-btn {
      padding: 5px 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--btn-bg);
      color: var(--text-dim);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.12s;
    }
    .format-btn.active {
      background: rgba(233,69,96,0.15);
      border-color: var(--accent);
      color: var(--accent);
    }
    .format-btn:hover:not(.active) { background: var(--btn-hover); color: var(--text); }

    /* Controls */
    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }
    .ctrl-btn {
      flex: 1;
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.15s;
    }
    .ctrl-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .ctrl-btn.record  { background: var(--accent); color: white; }
    .ctrl-btn.record:hover:not(:disabled) { background: var(--accent-hover); transform: translateY(-1px); }
    .ctrl-btn.pause   { background: #e67e22; color: white; }
    .ctrl-btn.pause:hover:not(:disabled)  { background: #f39c12; }
    .ctrl-btn.stop    { background: #2c3e50; color: #ecf0f1; border: 1px solid #3d5166; }
    .ctrl-btn.stop:hover:not(:disabled)   { background: #3d5166; }

    /* Error / info message */
    .message {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 12px;
      margin-bottom: 16px;
      display: none;
      line-height: 1.5;
    }
    .message.info    { background: #0f3460; color: #7ec8e3; display: block; }
    .message.error   { background: #3d0f1a; color: #ff7088; display: block; }
    .message.success { background: #0f3d1a; color: #7ee3a0; display: block; }

    /* Preview */
    .preview-section {
      display: none;
      margin-top: 16px;
    }
    .preview-label {
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .preview-label .dl-link {
      font-size: 11px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .preview-label .dl-link:hover { text-decoration: underline; }
    video#preview {
      width: 100%;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #000;
      max-height: 220px;
      object-fit: contain;
    }

    /* Divider */
    .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

    .tip {
      font-size: 11px;
      color: var(--text-dim);
      text-align: center;
      line-height: 1.5;
    }
    .tip span { color: var(--text); }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="header-icon">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <circle cx="11" cy="11" r="9" stroke="#e94560" stroke-width="1.5" fill="none"/>
          <circle cx="11" cy="11" r="5" fill="#e94560"/>
        </svg>
      </div>
      <div>
        <div class="header-title">Screen Recorder</div>
        <div class="header-sub">Record your screen with audio</div>
      </div>
    </div>

    <div class="timer-display idle" id="timerDisplay">00:00</div>

    <div class="status-row">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Ready to record</span>
    </div>

    <div class="format-row">
      <span class="format-label">Format</span>
      <div class="format-group">
        <button class="format-btn active" data-format="video/webm;codecs=vp9">WebM</button>
        <button class="format-btn" data-format="video/webm;codecs=h264">WebM/H264</button>
        <button class="format-btn" data-format="video/mp4">MP4</button>
      </div>
    </div>

    <div id="msgBox" class="message"></div>

    <div class="controls">
      <button class="ctrl-btn record" id="recordBtn">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <circle cx="7" cy="7" r="6" stroke="white" stroke-width="1.4" fill="none"/>
          <circle cx="7" cy="7" r="3.5" fill="white"/>
        </svg>
        Start Recording
      </button>
      <button class="ctrl-btn pause" id="pauseBtn" disabled>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <rect x="3" y="2" width="3" height="10" rx="1" fill="white"/>
          <rect x="8" y="2" width="3" height="10" rx="1" fill="white"/>
        </svg>
        Pause
      </button>
      <button class="ctrl-btn stop" id="stopBtn" disabled>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <rect x="3" y="3" width="8" height="8" rx="1.5" fill="#ecf0f1"/>
        </svg>
        Stop
      </button>
    </div>

    <div id="previewSection" class="preview-section">
      <div class="preview-label">
        <span>Last recording</span>
        <a id="downloadLink" class="dl-link" download="recording.webm">Download</a>
      </div>
      <video id="preview" controls></video>
    </div>

    <hr class="divider">
    <p class="tip">
      Click <span>Start Recording</span> to choose a window or screen.<br>
      Audio is captured if your system supports it.
    </p>
  </div>

  <script src="recording.js"></script>
</body>
</html>
