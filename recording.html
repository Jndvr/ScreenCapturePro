<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screen Recorder — ScreenCapture Pro</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:             #111113;
      --surface:        #1c1c1f;
      --surface-hover:  #28282c;
      --border:         #36363a;
      --border-subtle:  #2c2c30;
      --text:           #ebebef;
      --text-muted:     #87878f;
      --text-dim:       #505058;
      --accent:         #e8485e;
      --accent-hover:   #f05570;
      --accent-dim:     rgba(232,72,94,0.13);
      --accent-border:  rgba(232,72,94,0.38);
      --amber:          #f5a623;
      --green:          #34c97a;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-radius: 4px;
    }

    /* ── Header bar ── */
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px 9px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .header-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      flex: 1;
    }

    /* ── Body ── */
    .body {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 14px 14px 12px;
      gap: 12px;
      overflow: hidden;
    }

    /* ── Timer + status ── */
    .timer-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--text-dim);
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .status-dot.ready     { background: var(--green); }
    .status-dot.recording { background: var(--accent); animation: blink 1s step-start infinite; }
    .status-dot.paused    { background: var(--amber); }
    @keyframes blink { 50% { opacity: 0.2; } }

    .status-text {
      font-size: 11px;
      color: var(--text-muted);
      flex: 1;
    }
    .timer {
      font-size: 22px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      font-family: 'SF Mono', 'Consolas', 'Menlo', monospace;
      color: var(--text-dim);
      letter-spacing: 1px;
      flex-shrink: 0;
      transition: color 0.2s;
    }
    .timer.running { color: var(--accent); }
    .timer.paused  { color: var(--amber); }

    /* ── Format selector ── */
    .format-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .format-label {
      font-size: 11px;
      color: var(--text-muted);
      width: 44px;
      flex-shrink: 0;
    }
    .format-group { display: flex; gap: 4px; }
    .format-btn {
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: transparent;
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s, color 0.1s;
    }
    .format-btn:hover:not(.active) { background: var(--surface-hover); color: var(--text); }
    .format-btn.active {
      background: var(--accent-dim);
      border-color: var(--accent-border);
      color: var(--accent);
    }

    /* ── Message ── */
    .msg {
      font-size: 11px;
      line-height: 1.5;
      padding: 7px 10px;
      border-radius: 6px;
      border: 1px solid transparent;
      display: none;
    }
    .msg.info    { display: block; background: #141e2c; color: #78b4e0; border-color: #1e3448; }
    .msg.error   { display: block; background: #1e0f14; color: #f07080; border-color: #3a1820; }
    .msg.success { display: block; background: #0d1e16; color: #6dd6a0; border-color: #1a3a28; }

    /* ── Controls ── */
    .controls {
      display: flex;
      gap: 6px;
      margin-top: auto;
    }
    .ctrl-btn {
      flex: 1;
      padding: 9px 12px;
      border: 1px solid transparent;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background 0.1s, border-color 0.1s;
    }
    .ctrl-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .ctrl-btn svg { width: 13px; height: 13px; flex-shrink: 0; }

    .ctrl-btn.start {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .ctrl-btn.start:hover:not(:disabled) { background: var(--accent-hover); }

    .ctrl-btn.pause {
      background: transparent;
      color: var(--amber);
      border-color: rgba(245,166,35,0.35);
    }
    .ctrl-btn.pause:hover:not(:disabled) { background: rgba(245,166,35,0.1); }

    .ctrl-btn.stop {
      background: transparent;
      color: var(--text-muted);
      border-color: var(--border);
    }
    .ctrl-btn.stop:hover:not(:disabled) { background: var(--surface-hover); color: var(--text); }

    /* ── Preview / download ── */
    .download-row {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .download-row.visible { display: flex; }
    .dl-info { font-size: 11px; color: var(--text-muted); }
    .dl-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface-hover);
      color: var(--text);
      font-size: 11px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.1s;
      flex-shrink: 0;
    }
    .dl-btn:hover { background: var(--border); }
    .dl-btn svg { width: 12px; height: 12px; }
  </style>
</head>
<body>

  <div class="header">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
      <circle cx="8" cy="8" r="6.5" stroke="#e8485e" stroke-width="1.3" fill="none"/>
      <circle cx="8" cy="8" r="3" fill="#e8485e"/>
    </svg>
    <span class="header-title">Screen Recorder</span>
  </div>

  <div class="body">

    <!-- Timer + status -->
    <div class="timer-row">
      <div class="status-dot ready" id="statusDot" aria-hidden="true"></div>
      <span class="status-text" id="statusText">Ready to record</span>
      <span class="timer" id="timerDisplay" aria-live="polite" aria-label="Recording duration">00:00</span>
    </div>

    <!-- Format (hidden while recording) -->
    <div class="format-row" id="formatRow">
      <span class="format-label" id="lbl-format">Format</span>
      <div class="format-group" role="group" aria-labelledby="lbl-format">
        <button class="format-btn active" data-format="video/webm;codecs=vp9">WebM</button>
        <button class="format-btn" data-format="video/webm;codecs=h264">WebM/H264</button>
        <button class="format-btn" data-format="video/mp4">MP4</button>
      </div>
    </div>

    <!-- Message -->
    <div class="msg" id="msgBox" role="status" aria-live="polite"></div>

    <!-- Download row (shown after stop) -->
    <div class="download-row" id="downloadRow">
      <span class="dl-info" id="dlInfo"></span>
      <a class="dl-btn" id="downloadLink" download="recording.webm">
        <svg viewBox="0 0 14 14" fill="none">
          <path d="M7 2v7M4 6l3 3 3-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2 11h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        Save
      </a>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="ctrl-btn start" id="recordBtn" aria-label="Start recording">
        <svg viewBox="0 0 14 14" fill="none">
          <circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.3" fill="none"/>
          <circle cx="7" cy="7" r="2.8" fill="currentColor"/>
        </svg>
        Start
      </button>
      <button class="ctrl-btn pause" id="pauseBtn" disabled aria-label="Pause recording">
        <svg viewBox="0 0 14 14" fill="none" id="pauseIcon">
          <rect x="3" y="2" width="2.8" height="10" rx="1" fill="currentColor"/>
          <rect x="8.2" y="2" width="2.8" height="10" rx="1" fill="currentColor"/>
        </svg>
        <span id="pauseLabel">Pause</span>
      </button>
      <button class="ctrl-btn stop" id="stopBtn" disabled aria-label="Stop recording">
        <svg viewBox="0 0 14 14" fill="none">
          <rect x="3" y="3" width="8" height="8" rx="1.5" fill="currentColor"/>
        </svg>
        Stop
      </button>
    </div>

  </div>

  <script src="recording.js"></script>
</body>
</html>
