<!DOCTYPE html>
<!-- Sandboxed extension page — 'unsafe-eval' is permitted here.
     We load Tesseract.js by fetching its source text and eval()ing it,
     bypassing the script-src https:// restriction entirely.
     Worker + core are also fetched and wrapped in blob: URLs so the
     spawned Worker never needs importScripts from a remote origin. -->
<html>
<head><meta charset="UTF-8"></head>
<body>
<script>
const CDN_JS   = 'https://unpkg.com/tesseract.js@5/dist/tesseract.min.js';
const CDN_WRK  = 'https://unpkg.com/tesseract.js@5/dist/worker.min.js';
const CDN_CORE = 'https://unpkg.com/tesseract.js-core@5/tesseract-core-lstm.wasm.js';

let _bootPromise = null;
let _workerUrl   = null;
let _coreUrl     = null;

function boot() {
  if (_bootPromise) return _bootPromise;
  _bootPromise = (async () => {
    // Fetch all three in parallel
    const [mainTxt, workerTxt, coreTxt] = await Promise.all([
      fetch(CDN_JS  ).then(r => { if (!r.ok) throw new Error('Tesseract fetch failed ' + r.status); return r.text(); }),
      fetch(CDN_WRK ).then(r => { if (!r.ok) throw new Error('Worker fetch failed '    + r.status); return r.text(); }),
      fetch(CDN_CORE).then(r => { if (!r.ok) throw new Error('Core fetch failed '      + r.status); return r.text(); })
    ]);

    // eval() the main UMD bundle → sets globalThis.Tesseract
    eval(mainTxt); // eslint-disable-line no-eval

    // Wrap worker + core as blob: URLs so spawned Workers load locally (no importScripts from https://)
    _workerUrl = URL.createObjectURL(new Blob([workerTxt], { type: 'application/javascript' }));
    _coreUrl   = URL.createObjectURL(new Blob([coreTxt],   { type: 'application/javascript' }));
  })();
  return _bootPromise;
}

window.addEventListener('message', async (e) => {
  const d = e.data;
  if (!d || d.type !== 'ocr') return;

  try {
    await boot();

    // Reconstruct canvas from the transferred pixel buffer
    const u8 = new Uint8ClampedArray(d.imageData);
    const cv = document.createElement('canvas');
    cv.width = d.width; cv.height = d.height;
    cv.getContext('2d').putImageData(new ImageData(u8, d.width, d.height), 0, 0);

    const { data: { text } } = await Tesseract.recognize(cv, 'eng', {
      workerPath: _workerUrl,
      corePath  : _coreUrl,
      logger    : () => {}
    });

    e.source.postMessage({ type: 'ocr-result', id: d.id, text: text.trim() }, '*');
  } catch (err) {
    e.source.postMessage({ type: 'ocr-error', id: d.id, error: err.message }, '*');
  }
});
</script>
</body>
</html>
